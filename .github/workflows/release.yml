name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build && npx electron-builder --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package zip for download
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $zip = "release/WEPL-Report-Viewer-$version-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip }
          Compress-Archive -Path "release/win-unpacked/*" -DestinationPath $zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WEPL Report Viewer ${{ github.ref_name }}
          generate_release_notes: true
          files: release/WEPL-Report-Viewer-*.zip
