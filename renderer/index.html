<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; frame-src 'self' wepl-report:;">
  <title>WEPL Report Viewer</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M8 13h2l1.5 4 2-7L15 13h1"/>
          </svg>
        </span>
        <div>
          <h1>WEPL Report Viewer</h1>
          <p class="hint">Search patient reports across local folders and APIs.</p>
        </div>
      </div>
      <a class="button-link secondary" href="settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </a>
    </header>

    <section class="card stack search-hero" id="search-panel">
      <div>
        <h2>Find a report</h2>
        <p class="hint">Enter the patient identifier and date of birth to locate matching reports.</p>
      </div>
      <form id="search-form" class="stack">
        <div class="field-grid">
          <div class="field">
            <label for="patient_id">Patient ID</label>
            <input id="patient_id" name="patient_id" type="text" required placeholder="e.g. 12345">
          </div>
          <div class="field">
            <label for="dob">Date of Birth</label>
            <input id="dob" name="dob" type="text" required placeholder="YYYY-MM-DD">
            <span class="field-note">Format must be YYYY-MM-DD.</span>
          </div>
        </div>

        <div class="button-row">
          <button type="submit" class="primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Search
          </button>
          <button type="button" class="secondary" id="browse-all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Browse All Reports
          </button>
        </div>
      </form>
    </section>

    <section class="card stack hidden" id="results-panel">
      <div class="results-head">
        <div>
          <h2 id="results-title">Search Results</h2>
          <div class="patient-chips" id="results-chips"></div>
        </div>
        <button type="button" class="secondary" id="back-to-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          New Search
        </button>
      </div>
      <div id="results-error" class="error hidden"></div>
      <div id="results-list"></div>
    </section>

    <section class="card stack hidden" id="report-panel">
      <div class="results-head">
        <div>
          <h2 id="report-title">Report</h2>
          <p class="hint" id="report-meta"></p>
        </div>
        <button type="button" class="secondary" id="back-to-results">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to Results
        </button>
      </div>
      <iframe id="report-frame" class="report-view" title="Report content" sandbox="allow-scripts"></iframe>
    </section>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
