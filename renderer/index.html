<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
  <title>WEPL Report Viewer</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <h1>WEPL Report Viewer</h1>
        <p class="hint">Search patient reports from local folders and configured APIs.</p>
      </div>
      <a class="button-link secondary" href="settings.html">Settings</a>
    </header>

    <section class="card stack" id="search-panel">
      <form id="search-form">
        <label for="patient_id">Patient ID</label>
        <input id="patient_id" name="patient_id" type="text" required placeholder="Example: 12345">

        <label for="dob">Date of Birth (YYYY-MM-DD)</label>
        <input id="dob" name="dob" type="text" required placeholder="Example: 1990-01-15">
        <div class="hint">Format must be YYYY-MM-DD.</div>

        <div class="button-row">
          <button type="submit" class="primary">Search</button>
        </div>
      </form>
    </section>

    <section class="card stack hidden" id="results-panel">
      <div>
        <h2>Search Results</h2>
        <p><strong>Patient ID:</strong> <span id="result-patient-id"></span><br>
        <strong>DOB:</strong> <span id="result-dob"></span></p>
      </div>
      <div id="results-error" class="error hidden"></div>
      <div id="results-list"></div>
      <div class="button-row">
        <button type="button" class="secondary" id="back-to-search">Back to Search</button>
      </div>
    </section>

    <section class="card stack hidden" id="report-panel">
      <div class="top-bar" style="margin-bottom: 0;">
        <div>
          <h2 id="report-title">Report</h2>
          <p class="hint" id="report-meta"></p>
        </div>
        <button type="button" class="secondary" id="back-to-results">Back to Results</button>
      </div>
      <iframe id="report-frame" class="report-view" title="Report content"></iframe>
    </section>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
